<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Sindicate</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #0a0a0a, #000);
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
      pointer-events: none;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 72px;
      letter-spacing: 12px;
      margin: 0;
      text-transform: uppercase;
      position: relative;
    }

    /* glitch effect */
    h1::before,
    h1::after {
      content: "RC SINDICATE";
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    h1::before {
      top: 2px;
      color: #ff003c;
      animation: glitch 2s infinite linear alternate-reverse;
    }

    h1::after {
      top: -2px;
      color: #00fff7;
      animation: glitch 3s infinite linear alternate-reverse;
    }

    @keyframes glitch {
      0% { transform: translate(0); opacity: 0.2; }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0); opacity: 0.2; }
    }

    p {
      max-width: 600px;
      color: #aaa;
      margin-top: 20px;
      line-height: 1.6;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 26px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #555;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>RC SINDICATE</h1>

    <p>
      A collective built in distortion, emotion, and underground energy.<br>
      Sound for the disconnected. Noise for the unheard.
    </p>

    <button class="btn">ENTER THE SOUND</button>

    <div class="footer">
      EST. // UNDERGROUND SIGNAL
    </div>

  </div>

</body>
</html>
